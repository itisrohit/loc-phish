<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loc-phish | Secure Portal Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/dashboard.css">
</head>
<body>

  <!-- Technical Background Traces & Circuit Grid -->
  <div class="tech-bg">
    <div class="grid-overlay"></div>
    <svg class="circuit-svg left-circuit" viewBox="0 0 400 800" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M-50,200 L150,200 L200,250 L200,450 L150,500 L-50,500" stroke="rgba(224, 169, 140, 0.08)" stroke-width="1.5" />
      <path d="M-50,205 L148,205 L196,253 L196,447 L148,495 L-50,495" stroke="rgba(0, 136, 255, 0.05)" stroke-width="1" />
      <circle cx="200" cy="350" r="4" fill="#0077ff" opacity="0.6" />
      <circle cx="150" cy="200" r="3" fill="#e0a98c" />
      <circle cx="150" cy="500" r="3" fill="#e0a98c" />
      <line x1="200" y1="250" x2="230" y2="250" stroke="rgba(0, 136, 255, 0.2)" stroke-width="1" stroke-dasharray="2 2" />
      <line x1="200" y1="450" x2="230" y2="450" stroke="rgba(0, 136, 255, 0.2)" stroke-width="1" stroke-dasharray="2 2" />
      <text x="210" y="244" fill="rgba(224, 169, 140, 0.3)" font-size="8" font-family="monospace">PORT_A // 443</text>
      <text x="210" y="462" fill="rgba(224, 169, 140, 0.3)" font-size="8" font-family="monospace">PORT_B // 80</text>
      <foreignObject x="10" y="315" width="120" height="70">
        <div class="tech-node-widget">
          <span class="widget-tag">CTRL // SYSTEM</span>
          <span class="widget-val">NET_ACTIVE</span>
        </div>
      </foreignObject>
    </svg>
    
    <svg class="circuit-svg right-circuit" viewBox="0 0 400 800" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M450,200 L250,200 L200,250 L200,450 L250,500 L450,500" stroke="rgba(224, 169, 140, 0.08)" stroke-width="1.5" />
      <path d="M450,205 L252,205 L204,253 L204,447 L252,495 L450,495" stroke="rgba(0, 136, 255, 0.05)" stroke-width="1" />
      <circle cx="200" cy="350" r="4" fill="#0077ff" opacity="0.6" />
      <circle cx="250" cy="200" r="3" fill="#e0a98c" />
      <circle cx="250" cy="500" r="3" fill="#e0a98c" />
      <line x1="200" y1="250" x2="170" y2="250" stroke="rgba(0, 136, 255, 0.2)" stroke-width="1" stroke-dasharray="2 2" />
      <line x1="200" y1="450" x2="170" y2="450" stroke="rgba(0, 136, 255, 0.2)" stroke-width="1" stroke-dasharray="2 2" />
      <text x="110" y="244" fill="rgba(224, 169, 140, 0.3)" font-size="8" font-family="monospace">DATA_FLOW</text>
      <text x="110" y="462" fill="rgba(224, 169, 140, 0.3)" font-size="8" font-family="monospace">SSL_ENCRYPT</text>
      <foreignObject x="270" y="315" width="120" height="70">
        <div class="tech-node-widget">
          <span class="widget-tag">SEC // DATA</span>
          <span class="widget-val">CIPHER_OK</span>
        </div>
      </foreignObject>
    </svg>
  </div>

  <!-- Top Navigation Header -->
  <header>
    <div class="logo-container">
      <span class="logo-icon">🛡️</span>
      <span class="logo-text">loc-phish</span>
    </div>
  </header>

  <!-- Loading State Indicator -->
  <div id="appLoading" style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
    <div style="font-size: 16px; color: var(--text-muted); animation: pulse 1s infinite alternate;">Loading secure portal...</div>
  </div>

  <!-- AUTH SCREEN -->
  <main id="authScreen" class="auth-container" style="display: none;">
    <!-- Circular Technical Ring Header -->
    <div class="auth-header-visual">
      <div class="tech-ring">
        <div class="tech-ring-inner">
          <svg viewBox="0 0 24 24" class="logo-svg" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 8V4h4M16 4h4v4M20 16v4h-4M8 20H4v-4" />
            <circle cx="12" cy="12" r="4" stroke-dasharray="2 2" />
            <circle cx="12" cy="12" r="1.5" fill="currentColor" />
          </svg>
        </div>
      </div>
      <h2>Secure Portal Access</h2>
      <p>Authenticate via Google to access the phish simulation campaign control room.</p>
    </div>

    <div class="auth-action-wrapper">
      <button type="button" id="googleSignInBtn" class="btn-google">
        <svg class="google-svg" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
      <div class="auth-error" id="authError" style="display: none; margin-top: 16px;"></div>
    </div>
  </main>

  <script type="module" src="/src/js/login.js"></script>
</body>
</html>
